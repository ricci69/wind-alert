name: Wind Alert Hourly Check

on:
  schedule:
    # Esegue lo script ogni ora
    - cron: '55 * * * *'
  workflow_dispatch: # Permette l'esecuzione manuale per test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-telegram-bot

      - name: Run wind alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Creiamo un file.env temporaneo per lo script
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >.env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >>.env
          python wind_alert.py

      - name: Commit and push state changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add wind_state.json
          # Usiamo || true per evitare che il workflow fallisca se non ci sono cambiamenti nello stato
          git commit -m "chore: update wind state [skip ci]" || echo "No changes to commit"
          git push
